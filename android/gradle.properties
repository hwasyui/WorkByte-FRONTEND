org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
# Filesystem watching relies on native OS file-change events, which mounted/bind-mounted
# volumes (Docker Desktop, WSL interop, etc.) don't reliably deliver -- Gradle's incremental
# state tracking then fails to read back its own intermediates (e.g. mergeReleaseResources).
org.gradle.vfs.watch=false
android.useAndroidX=true
# This builtInKotlin flag was added automatically by Flutter migrator
android.builtInKotlin=false
# This newDsl flag was added automatically by Flutter migrator
android.newDsl=false
